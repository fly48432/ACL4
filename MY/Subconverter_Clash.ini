;dorian 自定义规则配置
;基于 Loon 配置转换

[custom]

;策略组定义
;参考你的 Loon Proxy Group 配置

;节点选择 - 手动选择
custom_proxy_group=节点选择`select`[]香港节点`[]狮城节点`[]美国节点`[]日本节点`[]韩国节点`[]台湾节点`[]其他节点

;香港节点 - 自动测速
custom_proxy_group=香港节点`url-test`(港|HK|Hong)`http://www.gstatic.com/generate_204`600,,200

;美国节点 - 手动选择
custom_proxy_group=美国节点`select`(美|US|United States)`http://cp.cloudflare.com/generate_204`600

;狮城节点 - 自动测速
custom_proxy_group=狮城节点`url-test`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`600,,200

;台湾节点 - 自动测速
custom_proxy_group=台湾节点`url-test`(台|TW|Tai)`http://cp.cloudflare.com/generate_204`600

;日本节点 - 自动测速
custom_proxy_group=日本节点`url-test`(日本|日|JP|Japan)`http://www.gstatic.com/generate_204`600,,200

;韩国节点 - 自动测速
custom_proxy_group=韩国节点`url-test`(KR|Korea|KOR|韩)`http://www.gstatic.com/generate_204`600,,200

;其他节点 - 排除已知地区后的剩余节点
custom_proxy_group=其他节点`select`(?i)^(?!.*(港|HK|Hong|台|TW|Tai|日本|日|JP|Japan|KR|Korea|KOR|韩|美|US|United States|新加坡|坡|狮城|SG|Singapore))`http://www.gstatic.com/generate_204`600,,200

;Apple Proxy - Apple 需要代理的服务（Apple TV、Apple News 等）
custom_proxy_group=Apple Proxy`select`[]节点选择`[]香港节点`[]狮城节点`[]美国节点`[]日本节点`[]台湾节点`[]韩国节点`[]DIRECT

;Steam - Steam 游戏平台
custom_proxy_group=Steam`select`[]DIRECT`[]节点选择`[]香港节点`[]狮城节点`[]美国节点`[]日本节点`[]台湾节点`[]韩国节点

;国际直连 - 国际可直连但偶尔需要代理的服务（Spotify、GitHub 等）
custom_proxy_group=国际直连`select`[]DIRECT`[]节点选择`[]香港节点`[]狮城节点`[]美国节点`[]日本节点`[]台湾节点`[]韩国节点

;FINAL - 兜底
custom_proxy_group=FINAL`select`[]DIRECT`[]节点选择

;规则定义 - 对应你 Loon 的 Remote Rule 部分

;广告拦截
ruleset=REJECT,https://adrules.top/adrules.list

;LAN 和直连
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/fly48432/ACL4@main/Rules/Clash/LAN
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/fly48432/ACL4@main/Rules/Clash/Direct.list

