;dorian sing-box 订阅转换配置
;国家节点分组（带 filter）在 BaseSingbox.json 中定义，subconverter 无法从 INI 生成 filter
;此 INI 定义功能性策略组和规则集

[custom]

;分组已全部在 BaseSingbox.json 中定义（subconverter 会整体替换 outbounds，
;功能组必须和国家组一起放在 base，否则国家组会丢失导致依赖悬空）

;规则定义

;广告拦截
ruleset=REJECT,https://adrules.top/adrules.list

;LAN 和直连
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/fly48432/ACL4@main/Rules/Clash/LAN
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/fly48432/ACL4@main/Rules/Clash/Direct.list

;Claude
