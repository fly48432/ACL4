;dorian sing-box 订阅转换配置
;subconverter 对 sing-box 的 outbounds 每次都会整体替换，base 的 outbounds 无效
;因此所有分组必须通过 custom_proxy_group 声明（subconverter 会按正则静态筛节点）
;route.rules / route.rule_set 写在 BaseSingbox.json，靠 enable_rule_generator=false 保留

[custom]
enable_rule_generator=false
overwrite_original_rules=false
singbox_rule_base=https://raw.githubusercontent.com/fly48432/ACL4/main/MY/BaseSingbox.json

;入口分组
custom_proxy_group=节点选择`select`[]香港节点`[]狮城节点`[]美国节点`[]日本节点`[]台湾节点`[]韩国节点`[]其他节点

;国家/地区节点组（按节点名正则静态筛选）
custom_proxy_group=香港节点`url-test`(港|HK|Hong)`http://www.gstatic.com/generate_204`600,,200
custom_proxy_group=狮城节点`url-test`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`600,,200
custom_proxy_group=美国节点`select`(美|US|United States)
custom_proxy_group=日本节点`url-test`(日本|JP|Japan)`http://www.gstatic.com/generate_204`600,,200
custom_proxy_group=韩国节点`url-test`(KR|Korea|韩)`http://www.gstatic.com/generate_204`600,,200
custom_proxy_group=台湾节点`url-test`(台|TW|Tai)`http://cp.cloudflare.com/generate_204`600
custom_proxy_group=其他节点`select`^(?!.*(港|HK|Hong|台|TW|Tai|日本|JP|Japan|KR|Korea|韩|美|US|United States|新加坡|坡|狮城|SG|Singapore)).*$

;功能性策略组
custom_proxy_group=Apple Proxy`select`[]节点选择`[]香港节点`[]狮城节点`[]美国节点`[]日本节点`[]台湾节点`[]韩国节点`[]DIRECT
custom_proxy_group=Steam`select`[]DIRECT`[]节点选择`[]香港节点`[]狮城节点`[]美国节点`[]日本节点`[]台湾节点`[]韩国节点
custom_proxy_group=国际直连`select`[]DIRECT`[]节点选择`[]香港节点`[]狮城节点`[]美国节点`[]日本节点`[]台湾节点`[]韩国节点
custom_proxy_group=FINAL`select`[]节点选择`[]DIRECT
